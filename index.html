<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Строительный Трест 11</title>
<script src="https://api-maps.yandex.ru/2.1/?apikey=c5cc456c-23ca-4443-a345-1c1453673b93&geocoder_apikey=741f481e-e908-4ffa-9b4e-e63d6cdb6627&lang=ru_RU" type="text/javascript"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:       #e8ecf0;
  --surf:     #ffffff;
  --surf2:    #f2f4f7;
  --surf3:    #dde2e8;
  --border:   #d0d7df;
  --txt:      #1a2332;
  --dim:      #5a6a7e;
  --accent:   #2563eb;
  --accentH:  #1d4ed8;
  --danger:   #dc2626;
  --ok:       #16a34a;
  --hdr:      48px;
}

html, body {
  height: 100%;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--txt);
  overflow: hidden;
}

/* ── Header ─────────────────────────────────────────────── */
#hdr {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--hdr);
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  z-index: 1100;
}
#hdr h1 { font-size: 14px; font-weight: 700; }
#hdr-right { display: flex; align-items: center; gap: 10px; }
#status-txt { font-size: 11px; color: #475569; }

/* ── Layout ──────────────────────────────────────────────── */
#map {
  position: fixed;
  top: var(--hdr); left: 0; right: 0; bottom: 0;
  z-index: 0;
}

/* ── Sidebar (desktop) ───────────────────────────────────── */
#sidebar {
  position: fixed;
  top: var(--hdr); left: 0; bottom: 0;
  width: 300px;
  background: var(--surf);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 1000;
}
@media (min-width: 769px) {
  #map { left: 300px; }
}

.sb-head {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 8px;
  flex-shrink: 0;
}
.sb-row { display: flex; gap: 8px; }

#pts-list {
  flex: 1; overflow-y: auto;
  padding: 10px; display: flex; flex-direction: column; gap: 6px;
}
#pts-list::-webkit-scrollbar { width: 4px; }
#pts-list::-webkit-scrollbar-thumb { background: var(--surf3); border-radius: 4px; }

/* ── Buttons ─────────────────────────────────────────────── */
.btn {
  padding: 9px 14px; border: none; border-radius: 8px;
  cursor: pointer; font-size: 13px; font-weight: 500;
  font-family: inherit; display: inline-flex; align-items: center;
  gap: 6px; white-space: nowrap; transition: background .15s, color .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary { background: var(--accent); color: #fff; flex: 1; justify-content: center; }
.btn-primary:hover, .btn-primary:active { background: var(--accentH); }
.btn-ghost  { background: var(--surf3); color: var(--dim); }
.btn-ghost:hover, .btn-ghost:active { background: #475569; color: var(--txt); }
.btn-icon {
  background: transparent; border: none; cursor: pointer;
  color: var(--dim); padding: 6px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-icon:hover, .btn-icon:active { background: var(--surf3); color: var(--txt); }
.btn-icon.red:hover, .btn-icon.red:active { background: rgba(239,68,68,.15); color: var(--danger); }

/* ── Filter ──────────────────────────────────────────────── */
.filter-inp {
  width: 100%; background: var(--surf2);
  border: 1.5px solid var(--border); border-radius: 8px;
  color: var(--txt); padding: 8px 10px;
  font-size: 12px; outline: none; font-family: inherit;
  transition: border-color .15s;
}
.filter-inp:focus { border-color: var(--accent); }
.filter-inp::placeholder { color: #475569; }

/* ── Point cards ─────────────────────────────────────────── */
.pt-card {
  background: var(--surf2); border-radius: 9px;
  padding: 10px 12px; cursor: pointer;
  border: 2px solid transparent; transition: border-color .15s;
  display: flex; align-items: flex-start; gap: 10px;
  -webkit-tap-highlight-color: transparent;
}
.pt-card:hover { border-color: var(--surf3); }
.pt-card.active { border-color: var(--accent) !important; }
.pt-card.off { opacity: .35; }

.pt-dot { width:13px; height:13px; border-radius:50%; flex-shrink:0; margin-top:2px; border:2px solid rgba(255,255,255,.2); }
.pt-body { flex:1; min-width:0; }
.pt-name { font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pt-addr { font-size:11px; color:var(--dim); line-height:1.4; margin-top:2px; }
.pt-acts { display:flex; flex-direction:column; gap:2px; flex-shrink:0; }

.empty { text-align:center; padding:50px 12px; color:var(--dim); font-size:13px; line-height:1.9; }

/* ── Modal ───────────────────────────────────────────────── */
#overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); z-index: 2000;
  align-items: center; justify-content: center;
}
#overlay.on { display: flex; }

#modal {
  background: var(--surf); border-radius: 14px;
  padding: 24px; width: 460px; max-width: 96vw;
  max-height: 90dvh; overflow-y: auto;
  border: 1px solid var(--border);
  box-shadow: 0 24px 64px rgba(0,0,0,.7);
}
#modal::-webkit-scrollbar { width: 4px; }
#modal::-webkit-scrollbar-thumb { background: var(--surf3); border-radius: 4px; }

.m-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.m-hdr h2 { font-size:16px; font-weight:700; }

.lbl { font-size:10.5px; color:var(--dim); font-weight:700; letter-spacing:.4px; text-transform:uppercase; display:block; margin-bottom:5px; }
.inp {
  width:100%; background:var(--surf2);
  border:1.5px solid var(--border); border-radius:8px;
  color:var(--txt); padding:9px 12px; font-size:13px;
  outline:none; font-family:inherit; transition:border-color .15s;
}
.inp:focus { border-color:var(--accent); }
.inp::placeholder { color:#475569; }
.fg { margin-bottom:15px; }

.addr-wrap { position:relative; }
.sugg {
  display:none; position:absolute; top:100%; left:0; right:0;
  background:var(--surf2); border:1.5px solid var(--border); border-top:none;
  border-radius:0 0 8px 8px; z-index:2100; max-height:200px; overflow-y:auto;
}
.sugg.on { display:block; }
.sg {
  padding:9px 12px; font-size:12px; color:var(--dim);
  cursor:pointer; border-bottom:1px solid var(--border); line-height:1.4;
}
.sg:last-child { border:none; }
.sg:hover, .sg:active { background:var(--surf3); color:var(--txt); }
.sg b { color:var(--txt); }

.or-line {
  display:flex; align-items:center; gap:8px;
  font-size:11px; color:#475569; margin:12px 0;
}
.or-line::before, .or-line::after { content:''; flex:1; height:1px; background:var(--border); }

.coord-hint { font-size:11px; margin-top:5px; min-height:16px; color:#475569; }
.coord-hint.ok { color:var(--ok); }

/* palette */
.pal { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.pal-c {
  width:28px; height:28px; border-radius:50%;
  cursor:pointer; border:3px solid transparent;
  flex-shrink:0; transition:transform .12s, border-color .12s;
  -webkit-tap-highlight-color: transparent;
}
.pal-c:hover { transform:scale(1.15); }
.pal-c.sel { border-color:#fff; transform:scale(1.1); }
.pal-sep { width:1px; height:26px; background:var(--border); flex-shrink:0; }
.pal-custom { position:relative; width:28px; height:28px; flex-shrink:0; }
.pal-custom input[type=color] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; border:none; }
.pal-custom-face {
  width:28px; height:28px; border-radius:50%;
  border:2.5px dashed #475569;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none; font-size:17px; color:#475569; line-height:1;
}

.m-foot { display:flex; gap:10px; margin-top:20px; justify-content:flex-end; }

/* ── Confirm dialog ──────────────────────────────────────── */
#conf-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.75); z-index:2200;
  align-items:center; justify-content:center;
}
#conf-overlay.on { display:flex; }
#conf-box {
  background:var(--surf); border-radius:12px; padding:24px;
  width:300px; max-width:90vw; text-align:center;
  border:1px solid var(--border);
}
#conf-box p { font-size:14px; color:var(--dim); margin-bottom:18px; }
.conf-row { display:flex; gap:10px; justify-content:center; }
.btn-del { background:var(--danger); color:#fff; padding:9px 22px; border:none; border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; }
.btn-del:hover { background:#dc2626; }

/* ── Mobile ──────────────────────────────────────────────── */
#fab {
  display: none;
  position: fixed; bottom: 20px; right: 20px;
  z-index: 1050;
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--accent); color: #fff; border: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(59,130,246,.55);
  cursor: pointer; transition: transform .15s;
  -webkit-tap-highlight-color: transparent;
}
#fab:active { transform: scale(.92); }

#sb-backdrop {
  display: none; position: fixed; inset: 0;
  z-index: 999; background: rgba(0,0,0,.5);
}
#sb-backdrop.on { display: block; }

.drag-bar {
  display: none;
  width: 40px; height: 4px; border-radius: 2px;
  background: var(--surf3); margin: 10px auto 6px; flex-shrink: 0;
}

@media (max-width: 768px) {
  #sidebar {
    top: auto;
    bottom: 0; left: 0; right: 0;
    width: 100%; height: 65dvh;
    border-right: none;
    border-top: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    transform: translateY(100%);
    transition: transform .28s cubic-bezier(.4,0,.2,1);
    z-index: 1050;
    box-shadow: 0 -6px 30px rgba(0,0,0,.5);
  }
  #sidebar.on { transform: translateY(0); }

  .drag-bar { display: block; }
  #fab { display: flex; }

  #modal {
    width: 100%; max-width: 100%;
    border-radius: 18px 18px 0 0;
    border-left: none; border-right: none; border-bottom: none;
    max-height: 92dvh;
    padding: 20px 16px 36px;
  }
  #overlay { align-items: flex-end; }

  .pt-acts { flex-direction: row; }
}
</style>
</head>
<body>

<div id="hdr">
  <h1>Строительный Трест 11</h1>
  <div id="hdr-right">
    <span id="status-txt"></span>
    <button class="btn-icon" onclick="toggleAll()" title="Показать / скрыть все">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/></svg>
    </button>
  </div>
</div>

<div id="map"></div>

<aside id="sidebar">
  <div class="drag-bar" id="drag-bar"></div>
  <div class="sb-head">
    <div class="sb-row">
      <button class="btn btn-primary" onclick="openAdd()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Добавить точку
      </button>
    </div>
    <input class="filter-inp" id="filter" placeholder="Поиск по названию или адресу…" oninput="renderList()" autocomplete="off">
  </div>
  <div id="pts-list"></div>
</aside>

<!-- Mobile FAB -->
<button id="fab" onclick="openSidebar()" title="Список точек">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
    <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
    <circle cx="3" cy="6" r="1.5" fill="currentColor" stroke="none"/>
    <circle cx="3" cy="12" r="1.5" fill="currentColor" stroke="none"/>
    <circle cx="3" cy="18" r="1.5" fill="currentColor" stroke="none"/>
  </svg>
</button>
<div id="sb-backdrop" onclick="closeSidebar()"></div>

<!-- Modal -->
<div id="overlay" onclick="overlayClick(event)">
  <div id="modal">
    <div class="m-hdr">
      <h2 id="m-title">Добавить точку</h2>
      <button class="btn-icon" onclick="closeModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="fg">
      <label class="lbl">Название</label>
      <input class="inp" id="i-name" type="text" placeholder="Объект №1">
    </div>

    <div class="fg">
      <label class="lbl">Поиск по адресу</label>
      <div class="addr-wrap">
        <input class="inp" id="i-addr" type="text" placeholder="Введите адрес…" autocomplete="off">
        <div class="sugg" id="sugg"></div>
      </div>
    </div>

    <div class="or-line">или координаты через запятую</div>

    <div class="fg">
      <label class="lbl">Широта, Долгота</label>
      <input class="inp" id="i-coords" type="text" placeholder="55.751244, 37.618423" oninput="onCoords()" autocomplete="off">
      <div class="coord-hint" id="c-hint"></div>
    </div>

    <div class="fg">
      <label class="lbl">Цвет</label>
      <div class="pal" id="pal"></div>
    </div>

    <div class="m-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="savePoint()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Confirm -->
<div id="conf-overlay" onclick="confOverlayClick(event)">
  <div id="conf-box">
    <p>Удалить эту точку?</p>
    <div class="conf-row">
      <button class="btn btn-ghost" onclick="closeConf()">Отмена</button>
      <button class="btn-del" id="conf-yes">Удалить</button>
    </div>
  </div>
</div>

<script>
// ── Firebase config ──────────────────────────────────────
const FB = {
  apiKey:            "",
  authDomain:        "",
  projectId:         "",
  storageBucket:     "",
  messagingSenderId: "",
  appId:             ""
};

// ── Constants ────────────────────────────────────────────
const COLORS = [
  '#ef4444','#f97316','#f59e0b','#eab308','#84cc16','#22c55e',
  '#10b981','#14b8a6','#06b6d4','#3b82f6','#6366f1','#8b5cf6',
  '#a855f7','#ec4899','#f43f5e','#fb7185','#94a3b8','#64748b',
  '#0ea5e9','#d97706','#dc2626','#16a34a','#7c3aed','#db2777'
];

// ── State ────────────────────────────────────────────────
let db = null, map = null;
let pts = [], layers = {}, editId = null, pCoords = null, color = COLORS[0];
let prevM = null, searchT = null;

// ── Persist (local) ──────────────────────────────────────
function saveLocal() { try { localStorage.setItem('st11v2', JSON.stringify(pts)); } catch(e){} }
function loadLocal() {
  try {
    const r = localStorage.getItem('st11v2');
    if (r) { pts = JSON.parse(r); return; }
    const old = localStorage.getItem('st11_points');
    if (old) {
      const parsed = JSON.parse(old);
      pts = parsed.map(p => ({
        ...p, c: p.c || p.coords,
        addr: p.addr || '', name: p.name || 'Точка'
      }));
      saveLocal(); return;
    }
    pts = getDefaults();
  } catch(e) { pts = getDefaults(); }
}

// ── Persist (Firestore) ───────────────────────────────────
async function fsSet(p) { if (db) await db.collection('points').doc(p.id).set(p); }
async function fsDel(id) { if (db) await db.collection('points').doc(id).delete(); }
async function fsUpdate(id, data) { if (db) await db.collection('points').doc(id).update(data); }

async function migrateIfEmpty() {
  const snap = await db.collection('points').limit(1).get();
  if (!snap.empty) return;
  let src = [];
  try {
    const r = localStorage.getItem('st11v2') || localStorage.getItem('st11_points');
    if (r) src = JSON.parse(r);
  } catch(e) {}
  if (!src.length) src = getDefaults();
  const batch = db.batch();
  src.forEach(p => {
    p.c = p.c || p.coords || [55.75, 37.62];
    batch.set(db.collection('points').doc(p.id), p);
  });
  await batch.commit();
}

// ── Render map ───────────────────────────────────────────
function renderMap() {
  Object.values(layers).forEach(pm => map.geoObjects.remove(pm));
  layers = {};
  pts.forEach(p => {
    if (p.on === false) return;
    const pm = new ymaps.Placemark(p.c, {
      balloonContent: `<b style="color:${p.color}">${p.name}</b><br><span style="font-size:12px">${p.addr}</span>`
    }, {
      preset: 'islands#circleDotIcon',
      iconColor: p.color
    });
    map.geoObjects.add(pm);
    layers[p.id] = pm;
  });
}

// ── Render list ──────────────────────────────────────────
function renderList() {
  const q = (document.getElementById('filter').value || '').toLowerCase();
  const el = document.getElementById('pts-list');
  const list = q ? pts.filter(p => p.name.toLowerCase().includes(q) || p.addr.toLowerCase().includes(q)) : pts;

  if (!list.length) {
    el.innerHTML = `<div class="empty">${q ? 'Ничего не найдено.' : 'Нет точек.<br>Нажмите «Добавить точку».'}</div>`;
    return;
  }
  el.innerHTML = '';
  list.forEach(p => {
    const d = document.createElement('div');
    d.className = 'pt-card' + (p.on === false ? ' off' : '');
    d.dataset.id = p.id;
    const eyeIcon = p.on === false
      ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22"/></svg>`
      : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    d.innerHTML = `
      <div class="pt-dot" style="background:${p.color}"></div>
      <div class="pt-body">
        <div class="pt-name">${p.name}</div>
        <div class="pt-addr">${p.addr}</div>
      </div>
      <div class="pt-acts">
        <button class="btn-icon" onclick="toggleOne('${p.id}',event)" title="${p.on===false?'Показать':'Скрыть'}">${eyeIcon}</button>
        <button class="btn-icon" onclick="openEdit('${p.id}',event)" title="Редактировать">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn-icon red" onclick="askDel('${p.id}',event)" title="Удалить">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>`;
    d.addEventListener('click', () => zoom(p.id));
    el.appendChild(d);
  });
}

function render() { renderMap(); renderList(); updStatus(); }
function updStatus() {
  const vis = pts.filter(p => p.on !== false).length;
  document.getElementById('status-txt').textContent = `${pts.length} точек · ${vis} видно`;
}

// ── Zoom ─────────────────────────────────────────────────
function zoom(id) {
  const pm = layers[id];
  if (!pm) return;
  const coords = pm.geometry.getCoordinates();
  map.setCenter(coords, 16);
  pm.balloon.open();
  document.querySelectorAll('.pt-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.pt-card[data-id="${id}"]`);
  if (card) { card.classList.add('active'); card.scrollIntoView({ block:'nearest' }); }
  if (window.innerWidth <= 768) closeSidebar();
}

// ── Toggle ────────────────────────────────────────────────
function toggleOne(id, e) {
  e.stopPropagation();
  const p = pts.find(x => x.id === id);
  p.on = (p.on === false);
  if (db) fsUpdate(id, { on: p.on }); else { saveLocal(); render(); }
}
function toggleAll() {
  const anyOn = pts.some(p => p.on !== false);
  pts.forEach(p => p.on = !anyOn);
  if (db) {
    const batch = db.batch();
    pts.forEach(p => batch.update(db.collection('points').doc(p.id), { on: p.on }));
    batch.commit();
  } else { saveLocal(); render(); }
}

// ── Delete ────────────────────────────────────────────────
let delId = null;
function askDel(id, e) {
  e.stopPropagation();
  delId = id;
  document.getElementById('conf-overlay').classList.add('on');
}
function closeConf() { delId = null; document.getElementById('conf-overlay').classList.remove('on'); }
function confOverlayClick(e) { if (e.target === document.getElementById('conf-overlay')) closeConf(); }
document.getElementById('conf-yes').onclick = () => {
  if (db) { fsDel(delId); }
  else { pts = pts.filter(p => p.id !== delId); saveLocal(); render(); }

function closeSidebar() {

// ── Modal ─────────────────────────────────────────────────
function buildPal() {
  const el = document.getElementById('pal');
  el.innerHTML = '';
  COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'pal-c' + (c === color ? ' sel' : '');
    d.style.background = c;
    d.onclick = () => { color = c; buildPal(); };
    el.appendChild(d);
  });
  const sep = document.createElement('div');
  sep.className = 'pal-sep';
  el.appendChild(sep);
  const wrap = document.createElement('div');
  wrap.className = 'pal-custom';
  wrap.title = 'Любой цвет';
  const inp = document.createElement('input');
  inp.type = 'color'; inp.value = color;
  inp.oninput = e => { color = e.target.value; buildPal(); };
  const face = document.createElement('div');
  face.className = 'pal-custom-face';
  face.style.background = COLORS.includes(color) ? '' : color;
  face.style.border = COLORS.includes(color) ? '' : '3px solid #fff';
  face.textContent = COLORS.includes(color) ? '+' : '';
  wrap.appendChild(inp); wrap.appendChild(face);
  el.appendChild(wrap);
}

function setHint(c) {
  const el = document.getElementById('c-hint');
  if (c) { el.textContent = c[0].toFixed(6) + ', ' + c[1].toFixed(6); el.className = 'coord-hint ok'; }
  else   { el.textContent = ''; el.className = 'coord-hint'; }
}

function setCField(c) {
  document.getElementById('i-coords').value = c ? c[0] + ', ' + c[1] : '';
}

function clearPrev() {
  if (prevM && map) { map.geoObjects.remove(prevM); prevM = null; }
}

function openAdd() {
  editId = null; pCoords = null;
  color = COLORS[pts.length % COLORS.length];
  document.getElementById('m-title').textContent = 'Добавить точку';
  document.getElementById('i-name').value = '';
  document.getElementById('i-addr').value = '';
  setCField(null); setHint(null); clearPrev(); buildPal();
  document.getElementById('overlay').classList.add('on');
}

function openEdit(id, e) {
  e.stopPropagation();
  const p = pts.find(x => x.id === id);
  if (!p) return;
  editId = id; pCoords = [...p.c]; color = p.color;
  document.getElementById('m-title').textContent = 'Редактировать точку';
  document.getElementById('i-name').value = p.name;
  document.getElementById('i-addr').value = p.addr;
  setCField(p.c); setHint(p.c); clearPrev(); buildPal();
  document.getElementById('overlay').classList.add('on');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('sugg').classList.remove('on');
  clearPrev();
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

// ── Address search (Яндекс геокодер) ─────────────────────
const addrInp = document.getElementById('i-addr');
const sugg = document.getElementById('sugg');

addrInp.addEventListener('input', () => {
  clearTimeout(searchT);
  const q = addrInp.value.trim();
  if (q.length < 3) { sugg.classList.remove('on'); return; }
  searchT = setTimeout(() => doSearch(q), 400);
});
addrInp.addEventListener('blur', () => setTimeout(() => sugg.classList.remove('on'), 200));

async function doSearch(q) {
  sugg.innerHTML = '<div class="sg" style="color:#475569">Поиск…</div>';
  sugg.classList.add('on');
  try {
    const result = await ymaps.geocode('Москва, ' + q, { results: 5 });
    const items = result.geoObjects.toArray();
    sugg.innerHTML = '';
    if (!items.length) {
      sugg.innerHTML = '<div class="sg" style="color:#475569">Ничего не найдено</div>';
      return;
    }
    items.forEach(item => {
      const label = item.getAddressLine();
      const coords = item.geometry.getCoordinates();
      const d = document.createElement('div');
      d.className = 'sg';
      const parts = label.split(',');
      d.innerHTML = `<b>${parts[0]}</b>${parts[1] ? ', ' + parts[1] : ''}`;
      d.addEventListener('mousedown', () => pickAddr(label, coords));
      d.addEventListener('touchstart', () => pickAddr(label, coords), { passive: true });
      sugg.appendChild(d);
    });
  } catch(e) {
    console.error('ymaps.geocode error:', e);
    sugg.innerHTML = `<div class="sg" style="color:#475569">Ошибка: ${e && (e.message || JSON.stringify(e))}</div>`;
  }
}

function pickAddr(fullAddr, c) {
  pCoords = c;
  addrInp.value = fullAddr.split(',').slice(0, 2).join(',').trim();
  sugg.classList.remove('on');
  setCField(c); setHint(c);
  clearPrev();
  prevM = new ymaps.Placemark(c, {}, { preset: 'islands#circleDotIcon', iconColor: color });
  map.geoObjects.add(prevM);
  map.setCenter(c, 16);
}

// ── Manual coords ─────────────────────────────────────────
function onCoords() {
  const raw = document.getElementById('i-coords').value;
  const parts = raw.split(',').map(s => parseFloat(s.trim()));
  const [lat, lon] = parts;
  if (parts.length >= 2 && !isNaN(lat) && !isNaN(lon) && lat>=-90 && lat<=90 && lon>=-180 && lon<=180) {
    pCoords = [lat, lon];
    setHint([lat, lon]);
    clearPrev();
    prevM = new ymaps.Placemark([lat, lon], {}, { preset: 'islands#circleDotIcon', iconColor: color });
    map.geoObjects.add(prevM);
    const z = map.getZoom() < 14 ? 14 : map.getZoom();
    map.setCenter([lat, lon], z);
  } else {
    setHint(null);
  }
}

// ── Save ──────────────────────────────────────────────────
function savePoint() {
  const name = document.getElementById('i-name').value.trim();
  const addr = document.getElementById('i-addr').value.trim() ||
               (pCoords ? pCoords[0].toFixed(5) + ', ' + pCoords[1].toFixed(5) : '');
  if (!name) { alert('Введите название точки.'); return; }
  if (!pCoords) { alert('Укажите адрес или координаты.'); return; }
  const p = editId
    ? { ...pts.find(x => x.id === editId), name, addr, color, c: pCoords }
    : { id: Date.now()+'', name, addr, color, c: pCoords, on: true };
  if (db) {
    fsSet(p);
  } else {
    if (editId) { const i = pts.findIndex(x => x.id === editId); pts[i] = p; }
    else pts.push(p);
    saveLocal(); render();
  }
  closeModal();
}

    options: { position: { right: 10, bottom: 80 } }
  }));

  if (FB.apiKey && FB.projectId) {
    firebase.initializeApp(FB);
    db = firebase.firestore();
    db.collection('points').onSnapshot(snap => {
      pts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    }, err => {
      console.error('Firestore:', err);
      db = null; loadLocal(); render();
    });
    migrateIfEmpty();
  } else {
    loadLocal(); render();
  }
});
